name: cloudflare

on:
  workflow_dispatch:

env:
  token: ${{ secrets.GTOKEN_ACTION }}

jobs:
  cloudflare:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
          secrets: |
            token