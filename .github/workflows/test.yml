name: Deployment Workflow - ${{ github.event.inputs.deploy_version }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment'
        required: true
        default: 'production'
      deploy_version:
        description: 'Version to deploy'
        required: true

jobs:
  build:
    runs-on: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Deploy application
        run: |
          echo "Deploying version ${{ github.event.inputs.deploy_version }}"